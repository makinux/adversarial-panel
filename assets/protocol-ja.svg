<svg xmlns="http://www.w3.org/2000/svg" width="780" height="445" viewBox="0 0 780 445">
  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5B4B8F"/>
    </marker>
  </defs>
  <rect width="780" height="445" rx="16" fill="#ECE9DF"/>

  <!-- ROUND 0 (ファシリテータ, 左上) -->
  <rect x="45" y="48" width="200" height="96" rx="10" fill="#FFFFFF" stroke="#2B2833" stroke-width="1.5"/>
  <text x="145" y="75" text-anchor="middle" font-family="Georgia,serif" font-size="10.5" letter-spacing="2" fill="#8A8794">ROUND 0</text>
  <text x="145" y="103" text-anchor="middle" font-family="Meiryo,'Yu Gothic',sans-serif" font-weight="bold" font-size="15.5" fill="#1E1C26">フレーミング</text>
  <text x="145" y="125" text-anchor="middle" font-family="Meiryo,'Yu Gothic',sans-serif" font-size="10.5" fill="#8A8794">要否判断・brief作成</text>

  <line x1="245" y1="96" x2="282" y2="96" stroke="#5B4B8F" stroke-width="2.2" marker-end="url(#ah)"/>

  <!-- ROUND 1 (パネリスト, 中央上) -->
  <rect x="290" y="48" width="200" height="96" rx="12" fill="#6C5B9E" stroke="#3E3462" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="390" y="75" text-anchor="middle" font-family="Georgia,serif" font-size="10.5" letter-spacing="2" fill="rgba(255,255,255,0.65)">ROUND 1</text>
  <text x="390" y="103" text-anchor="middle" font-family="Meiryo,'Yu Gothic',sans-serif" font-weight="bold" font-size="15.5" fill="#FFFFFF">独立回答</text>
  <text x="390" y="125" text-anchor="middle" font-family="Meiryo,'Yu Gothic',sans-serif" font-size="10.5" fill="rgba(255,255,255,0.82)">blind・並列</text>

  <line x1="490" y1="96" x2="527" y2="96" stroke="#5B4B8F" stroke-width="2.2" marker-end="url(#ah)"/>
  <line x1="508" y1="104" x2="508" y2="152" stroke="#8A8794" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="508" y="172" text-anchor="middle" font-family="Georgia,serif" font-style="italic" font-size="12" fill="#6B6875">validation gate</text>

  <!-- ROUND 2 (パネリスト, 右上) -->
  <rect x="535" y="48" width="200" height="96" rx="12" fill="#6C5B9E" stroke="#3E3462" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="635" y="75" text-anchor="middle" font-family="Georgia,serif" font-size="10.5" letter-spacing="2" fill="rgba(255,255,255,0.65)">ROUND 2</text>
  <text x="635" y="103" text-anchor="middle" font-family="Meiryo,'Yu Gothic',sans-serif" font-weight="bold" font-size="15.5" fill="#FFFFFF">相互批判</text>
  <text x="635" y="125" text-anchor="middle" font-family="Meiryo,'Yu Gothic',sans-serif" font-size="10.5" fill="rgba(255,255,255,0.82)">再現による反証</text>

  <line x1="635" y1="144" x2="635" y2="292" stroke="#5B4B8F" stroke-width="2.2" marker-end="url(#ah)"/>

  <!-- ROUND 3 (パネリスト, 右下) -->
  <rect x="535" y="300" width="200" height="96" rx="12" fill="#6C5B9E" stroke="#3E3462" stroke-width="1.8" stroke-dasharray="6 4"/>
  <text x="635" y="327" text-anchor="middle" font-family="Georgia,serif" font-size="10.5" letter-spacing="2" fill="rgba(255,255,255,0.65)">ROUND 3</text>
  <text x="635" y="355" text-anchor="middle" font-family="Meiryo,'Yu Gothic',sans-serif" font-weight="bold" font-size="15.5" fill="#FFFFFF">最終見解</text>
  <text x="635" y="377" text-anchor="middle" font-family="Meiryo,'Yu Gothic',sans-serif" font-size="10.5" fill="rgba(255,255,255,0.82)">譲歩・防御・確信度</text>

  <line x1="535" y1="348" x2="253" y2="348" stroke="#5B4B8F" stroke-width="2.2" marker-end="url(#ah)"/>

  <!-- SYNTHESIS (ファシリテータ, 左下) -->
  <rect x="45" y="300" width="200" height="96" rx="10" fill="#FFFFFF" stroke="#2B2833" stroke-width="1.5"/>
  <text x="145" y="327" text-anchor="middle" font-family="Georgia,serif" font-size="10.5" letter-spacing="2" fill="#8A8794">SYNTHESIS</text>
  <text x="145" y="355" text-anchor="middle" font-family="Meiryo,'Yu Gothic',sans-serif" font-weight="bold" font-size="15.5" fill="#1E1C26">統合</text>
  <text x="145" y="377" text-anchor="middle" font-family="Meiryo,'Yu Gothic',sans-serif" font-size="10.5" fill="#8A8794">合意・対立・結論</text>
</svg>
